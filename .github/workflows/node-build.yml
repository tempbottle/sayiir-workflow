name: Build Node.js addons

# Reusable cross-compile of the NAPI addon for every published platform.
#
# Single source of truth for the platform matrix: called by `ci.yml` on every
# pull request as a cross-compile smoke test (no upload), and by `release.yml`
# with `upload-artifacts: true` to stage the binaries that get published. This
# guarantees a release can never hit a cross-compile failure that a PR did not.
on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload each built sayiir-node.node as a per-platform artifact.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Node.js (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (glibc) ──
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libsayiir_node.so

          - platform: linux-arm64-gnu
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib: libsayiir_node.so
            cross: true

          # ── Linux (musl) ──
          # musl defaults to a static CRT, which forbids cdylib output; disabling
          # crt-static restores dynamic linking so the .node can be produced.
          - platform: linux-x64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            lib: libsayiir_node.so
            cross: true
            rustflags: -C target-feature=-crt-static

          - platform: linux-arm64-musl
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            lib: libsayiir_node.so
            cross: true
            rustflags: -C target-feature=-crt-static

          # ── macOS ──
          - platform: darwin-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            lib: libsayiir_node.dylib

          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            lib: libsayiir_node.dylib

          # ── Windows ──
          - platform: win32-x64-msvc
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            lib: sayiir_node.dll

          - platform: win32-arm64-msvc
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            lib: sayiir_node.dll

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # Build the native addon. The cdylib output is a shared library
      # (.so/.dylib/.dll) that Node.js loads via require().
      - name: Build native addon
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build -p sayiir-node --release --target ${{ matrix.target }}

      # Rename the platform-specific library to the universal name
      # that the npm package expects.
      - name: Rename to sayiir-node.node
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} sayiir-node.node

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform }}
          path: sayiir-node.node
          if-no-files-found: error
