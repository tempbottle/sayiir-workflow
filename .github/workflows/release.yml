name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: sayiir-python
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: sayiir-python/dist

  pypi-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: sayiir-python
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: sayiir-python/dist

  pypi-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: sayiir-python
          target: x64
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: sayiir-python/dist

  pypi-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: sayiir-python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: sayiir-python/dist

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [pypi-linux, pypi-macos, pypi-windows, pypi-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/sayiir
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  crates-publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/sayiir-core
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Authenticate with crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo ws publish --from-git --yes

  # Cross-compile every platform addon from the shared matrix and upload the
  # binaries as artifacts for node-publish. The same workflow runs on every PR
  # (without upload) so a release can't hit a build failure CI didn't catch.
  node-build:
    name: Build addons
    uses: ./.github/workflows/node-build.yml
    with:
      upload-artifacts: true

  node-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [node-build, flow-js-publish]
    environment:
      name: npm
      url: https://www.npmjs.com/org/sayiir
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # Node 24+ ships npm >= 11.5.1 which supports OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: artifacts/

      - name: Publish npm packages
        uses: ./.github/actions/publish-npm-napi
        with:
          package-dir: sayiir-nodejs

  cloudflare-js-publish:
    name: Publish @sayiir/cloudflare to npm
    runs-on: ubuntu-latest
    needs: flow-js-publish
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sayiir/cloudflare
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM
        run: |
          wasm-pack build sayiir-cloudflare --target web --out-dir ../sayiir-cloudflare-js/wasm
          rm -f sayiir-cloudflare-js/wasm/.gitignore sayiir-cloudflare-js/wasm/package.json sayiir-cloudflare-js/wasm/README.md

      - name: Build TypeScript
        working-directory: sayiir-cloudflare-js
        run: pnpm tsc

      - name: Determine npm dist-tag
        id: dist-tag
        shell: bash
        run: |
          version=$(node -p "require('./sayiir-cloudflare-js/package.json').version")
          if echo "$version" | grep -qE '-(alpha|beta|rc)'; then
            tag=$(echo "$version" | sed -E 's/.*-([a-z]+).*/\1/')
          else
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version with tag: $tag"

      - name: Publish to npm
        working-directory: sayiir-cloudflare-js
        run: |
          pnpm pack
          tarball=$(ls -1 *.tgz | head -1)
          echo "Publishing tarball: $tarball"
          npm publish "$tarball" --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}

  flow-js-publish:
    name: Publish @sayiir/flow-js to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sayiir/flow-js
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build TypeScript
        working-directory: sayiir-flow-js
        run: pnpm build

      - name: Determine npm dist-tag
        id: dist-tag
        shell: bash
        run: |
          version=$(node -p "require('./sayiir-flow-js/package.json').version")
          if echo "$version" | grep -qE '-(alpha|beta|rc)'; then
            tag=$(echo "$version" | sed -E 's/.*-([a-z]+).*/\1/')
          else
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version with tag: $tag"

      - name: Publish to npm
        working-directory: sayiir-flow-js
        env:
          NPM_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: |
          pnpm pack
          tarball=$(ls -1 *.tgz | head -1)
          echo "Publishing tarball: $tarball"
          npm publish "$tarball" --provenance --access public --tag "$NPM_TAG"
