name: Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ''
          filters: |
            bench:
              - 'sayiir-core/**'
              - 'sayiir-persistence/**'
              - 'sayiir-postgres/**'
              - 'sayiir-runtime/**'
              - 'sayiir-macros/**'
              - 'benchmarks/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  bench-smoke:
    name: Benchmark smoke
    needs: changes
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SAYIIR_BENCH_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/sayiir_bench
      RUST_LOG: warn,sayiir_bench=info

    steps:
      - uses: actions/checkout@v6

      - name: Start tuned Postgres
        run: |
          docker run -d --name pg-bench \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=sayiir_bench \
            -p 5432:5432 \
            --shm-size=1g \
            postgres:17-alpine \
            -c shared_buffers=1GB \
            -c effective_cache_size=3GB \
            -c work_mem=16MB \
            -c maintenance_work_mem=256MB \
            -c wal_buffers=16MB \
            -c max_wal_size=4GB \
            -c checkpoint_timeout=15min \
            -c checkpoint_completion_target=0.9 \
            -c synchronous_commit=off \
            -c random_page_cost=1.1 \
            -c max_connections=200 \
            -c jit=off
          for i in $(seq 1 30); do
            if docker exec pg-bench pg_isready -U postgres -d sayiir_bench >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker exec pg-bench psql -U postgres -d sayiir_bench -c "SHOW shared_buffers; SHOW synchronous_commit;"

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "benchmarks -> target"
          key: bench-smoke

      - name: Build sayiir-bench
        run: cargo build --release --manifest-path benchmarks/Cargo.toml --bin sayiir-bench

      - name: Throughput smoke (500 wf, 4 workers)
        run: |
          ./benchmarks/target/release/sayiir-bench \
            --results-dir benchmarks/results \
            throughput \
              --workflows 500 \
              --concurrency 16 \
              --workers 4 \
              --poll-ms 5 \
              --batch-size 32

      - name: Sleeping-giants smoke (100 wf x 3s sleep, 4 workers)
        run: |
          ./benchmarks/target/release/sayiir-bench \
            --results-dir benchmarks/results \
            sleeping-giants \
              --workflows 100 \
              --concurrency 16 \
              --workers 4 \
              --sleep-secs 3 \
              --poll-ms 50 \
              --batch-size 16

      - name: Upload result JSONs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: benchmarks/results/*.json
          if-no-files-found: warn
          retention-days: 30
