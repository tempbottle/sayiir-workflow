image:
  file: .gitpod.Dockerfile

tasks:
  - name: Build
    init: |
      cargo build
      pip install -e sayiir-python/
      cd sayiir-nodejs && npm install -g pnpm && pnpm install && cd ..
    command: |
      echo ""
      echo "🚀 Sayiir dev environment ready!"
      echo ""
      echo "  Rust:    cd examples/hello-world-rs && cargo run"
      echo "  Python:  python examples/hello-world-py/main.py"
      echo "  Node.js: cd examples/hello-world-node && pnpm tsx index.ts"
      echo ""

vscode:
  extensions:
    - rust-lang.rust-analyzer
    - ms-python.python

github:
  prebuilds:
    master: true
    branches: true
    pullRequests: true
    addBadge: false
