[workspace]
members = [
    "sayiir-core",
    "sayiir-persistence",
    "sayiir-postgres",
    "sayiir-runtime",
    "sayiir-macros",
    "sayiir-py",
    "tests/integration",
]
resolver = "2"

[workspace.package]
version = "0.1.0-alpha.3"
authors = ["Yacine Bouraoui <ybsoft2011@live.com>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/sayiir/sayiir"
homepage = "https://github.com/sayiir/sayiir"
categories = ["asynchronous", "concurrency"]
keywords = ["workflow", "orchestration", "durable", "async", "distributed"]
documentation = "https://docs.rs/sayiir-core"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[workspace.dependencies]
tracing = "0.1"
bytes = { version = "1", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rkyv = { version = "0.8", features = ["std", "bytecheck"] }
bytecheck = "0.8"
tokio = { version = "1", features = ["rt", "macros"] }
sha2 = "0.10"
strum = { version = "0.27", features = ["derive"] }
thiserror = "2"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono"] }
proptest = "1"
