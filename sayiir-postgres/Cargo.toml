[package]
name = "sayiir-postgres"
description = "PostgreSQL persistence backend for Sayiir workflow engine"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
categories.workspace = true
keywords.workspace = true

[lib]
name = "sayiir_postgres"
path = "src/lib.rs"

[dependencies]
sayiir-core = { version = "0.1.0", path = "../sayiir-core" }
sayiir-persistence = { version = "0.1.0", path = "../sayiir-persistence" }
sqlx = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
sayiir-runtime = { version = "0.1.0", path = "../sayiir-runtime", features = [
    "json",
] }
testcontainers = "0.26"
testcontainers-modules = { version = "0.14", features = ["postgres"] }
